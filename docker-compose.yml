# Infra de développement local : PostgreSQL.
# Démarrer : docker compose up -d
# (Le cache TMDB est en mémoire et les sessions en Postgres — pas de Redis, voir ADR-0012.)
services:
  postgres:
    image: postgres:16-alpine
    container_name: otium-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: otium
      POSTGRES_PASSWORD: otium
      POSTGRES_DB: otium
    ports:
      - "5432:5432"
    volumes:
      - otium-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U otium -d otium"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  otium-postgres:
