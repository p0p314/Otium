# Infra de développement local : PostgreSQL + Redis.
# Démarrer : docker compose up -d
services:
  postgres:
    image: postgres:16-alpine
    container_name: otium-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: otium
      POSTGRES_PASSWORD: otium
      POSTGRES_DB: otium
    ports:
      - "5432:5432"
    volumes:
      - otium-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U otium -d otium"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: otium-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    ports:
      - "6379:6379"
    volumes:
      - otium-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  otium-postgres:
  otium-redis:
