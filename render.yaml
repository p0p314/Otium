# Blueprint Render — Otium en service unique (l'API NestJS sert aussi le SPA buildé).
# Voir docs/deployment.md et docs/adr/0012-hebergement-gratuit-service-unique.md.
#
# Base de données : Postgres gratuit **Neon** (durable, scale-to-zero). On n'utilise pas
# le Postgres gratuit de Render, supprimé après 30 jours. Renseigner DATABASE_URL et
# TMDB_ACCESS_TOKEN dans le dashboard Render (marqués `sync: false`).
services:
  - type: web
    name: otium
    runtime: node
    plan: free
    # Migrations appliquées en fin de build (le tier gratuit ne supporte pas
    # `preDeployCommand`). Elles tournent une fois par déploiement — et non à chaque
    # réveil de veille, contrairement à une exécution au démarrage. `migrate deploy`
    # est idempotent (no-op sans migration en attente).
    # `--prod=false` : NODE_ENV=production ferait sinon sauter les devDependencies
    # (vite, nest, prisma…), toutes nécessaires au build. Pnpm est fourni par Render
    # via le champ `packageManager` de package.json (pas besoin de `corepack enable`,
    # qui échoue d'ailleurs sur le FS en lecture seule de l'image de build).
    buildCommand: |
      pnpm install --frozen-lockfile --prod=false
      pnpm --filter @otium/api exec prisma generate
      pnpm build
      pnpm --filter @otium/api run prisma:deploy:ci
    # Démarré depuis apps/api : WEB_DIST_PATH="../web/dist" pointe alors sur le SPA buildé.
    startCommand: pnpm --filter @otium/api run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # Chemin (relatif à apps/api) du SPA buildé servi par l'API.
      - key: WEB_DIST_PATH
        value: ../web/dist
      # Connexion Neon : utiliser l'URL **poolée** + `?sslmode=require`. À renseigner
      # dans le dashboard (secret).
      - key: DATABASE_URL
        sync: false
      # Jeton v4 TMDB ("API Read Access Token"). À renseigner dans le dashboard.
      - key: TMDB_ACCESS_TOKEN
        sync: false
      # Origine publique du service (utilisée par le CORS). Même domaine que le SPA en
      # service unique : y mettre l'URL Render (ex. https://otium.onrender.com).
      - key: WEB_ORIGIN
        sync: false
      # Cache TMDB en mémoire : 24 h par défaut, ajustable pour limiter les appels réseau.
      - key: TMDB_CACHE_TTL_SECONDS
        value: "86400"
      # Google Books — source prioritaire du catalogue de livres (ADR-0016). Facultative :
      # sans clé, l'API répond avec un quota anonyme nettement plus bas et renvoie
      # fréquemment des 503 ; Open Library assure alors le service.
      - key: GOOGLE_BOOKS_API_KEY
        sync: false
      # Cache livres : 7 j (les métadonnées d'un livre publié ne changent pas).
      - key: BOOKS_CACHE_TTL_SECONDS
        value: "604800"
      # Hardcover — vitrine « Livres à découvrir ». Jeton **personnel** (hardcover.app/account/api),
      # API en bêta. Absent : la section est simplement masquée, aucune erreur.
      - key: HARDCOVER_API_TOKEN
        sync: false
      # Notifications Push (VAPID — ADR-0020). Générer une fois via
      # `npx web-push generate-vapid-keys` et renseigner dans le dashboard (secrets).
      # Absentes : l'app démarre mais le Push est désactivé.
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        sync: false
      # Secret facultatif du déclencheur externe POST /api/notifications/run (cron).
      - key: NOTIFICATIONS_CRON_SECRET
        sync: false
