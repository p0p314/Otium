<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Otium — suivez tout ce que vous regardez, lisez et jouez." />
    <title>Otium</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-v4.png" />
    <!-- Couleur de l'UI navigateur/barre d'état, accordée au thème (le ThemeProvider
         la met à jour dynamiquement lors d'un basculement manuel). -->
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#faf7f0" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#131019" />
    <!-- iOS : comportement app plein écran une fois ajoutée à l'écran d'accueil. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Otium" />
    <!-- Écran de démarrage (logo + nom) affiché immédiatement, avant le JS, pour éviter
         l'écran blanc le temps du chargement. Retiré par main.tsx au premier rendu. -->
    <style>
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #faf7f0;
        transition: opacity 0.35s ease;
      }
      #app-splash svg {
        width: min(62vw, 300px);
        height: auto;
      }
      #app-splash .otium-lockup-dark {
        display: none;
      }
      @media (prefers-color-scheme: dark) {
        #app-splash {
          background: #1c1730;
        }
        #app-splash .otium-lockup-light {
          display: none;
        }
        #app-splash .otium-lockup-dark {
          display: block;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="app-splash" role="status" aria-label="Chargement d'Otium">
      <span class="otium-lockup-light">
        <svg xmlns="http://www.w3.org/2000/svg" width="530" height="200" viewBox="0 0 530 200" role="img" aria-label="Otium">
          <defs>
            <linearGradient id="splash-om-l" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#a78bfa"></stop><stop offset="1" stop-color="#6d28d9"></stop>
            </linearGradient>
          </defs>
          <g transform="translate(6,20) scale(0.315)">
            <circle cx="240" cy="254" r="134" fill="none" stroke="url(#splash-om-l)" stroke-width="58"></circle>
            <circle cx="400" cy="386" r="35" fill="#f38525"></circle>
          </g>
          <text x="205" y="126" font-family="Inter, system-ui, sans-serif" font-size="88" font-weight="700" letter-spacing="-1" fill="#2d2440">Otium<tspan fill="#f38525">.</tspan></text>
        </svg>
      </span>
      <span class="otium-lockup-dark">
        <svg xmlns="http://www.w3.org/2000/svg" width="530" height="200" viewBox="0 0 530 200" role="img" aria-label="Otium">
          <defs>
            <linearGradient id="splash-om-d" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#c4b5fd"></stop><stop offset="1" stop-color="#8b5cf6"></stop>
            </linearGradient>
          </defs>
          <g transform="translate(6,20) scale(0.315)">
            <circle cx="240" cy="254" r="134" fill="none" stroke="url(#splash-om-d)" stroke-width="58"></circle>
            <circle cx="400" cy="386" r="35" fill="#f38525"></circle>
          </g>
          <text x="205" y="126" font-family="Inter, system-ui, sans-serif" font-size="88" font-weight="700" letter-spacing="-1" fill="#f5f2ff">Otium<tspan fill="#f38525">.</tspan></text>
        </svg>
      </span>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
