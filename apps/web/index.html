<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Otium — suivez tout ce que vous regardez, lisez et jouez." />
    <title>Otium</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- Couleur de l'UI navigateur/barre d'état, accordée au thème (le ThemeProvider
         la met à jour dynamiquement lors d'un basculement manuel). -->
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#faf7f0" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#131019" />
    <!-- iOS : comportement app plein écran une fois ajoutée à l'écran d'accueil. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Otium" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
