name: Notifications

# Déclencheur EXTERNE de la détection de notifications (ADR-0019/0020).
#
# La détection interne est « opportuniste » : elle ne tourne qu'à l'occasion d'une requête
# utilisateur. Pour envoyer des notifications SANS activité de l'utilisateur, ce workflow
# appelle périodiquement l'endpoint protégé `POST /api/notifications/run`. L'appel réveille
# aussi le service (hébergement gratuit qui s'endort) puis lance la détection.
#
# Prérequis (une seule fois) — Settings → Secrets and variables → Actions → New secret :
#   - NOTIFICATIONS_BASE_URL   : URL publique du service (ex. https://otium.onrender.com)
#   - NOTIFICATIONS_CRON_SECRET: MÊME valeur que la variable d'env du serveur (Render)
# Tant que ces secrets sont absents, le job se termine sans rien faire (no-op).

on:
  schedule:
    # Toutes les 6 heures (UTC). Ajustable — l'anti-doublon rend toute fréquence sûre.
    - cron: "0 */6 * * *"
  # Permet aussi un déclenchement manuel depuis l'onglet Actions (test).
  workflow_dispatch: {}

# Une seule exécution à la fois : évite deux déclenchements concurrents.
concurrency:
  group: notifications
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Déclencher la détection de notifications
        env:
          BASE_URL: ${{ secrets.NOTIFICATIONS_BASE_URL }}
          CRON_SECRET: ${{ secrets.NOTIFICATIONS_CRON_SECRET }}
        run: |
          if [ -z "$BASE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Secrets NOTIFICATIONS_BASE_URL / NOTIFICATIONS_CRON_SECRET absents — rien à faire."
            exit 0
          fi
          # Le service gratuit peut être en veille (démarrage à froid) : délai large et
          # quelques tentatives. --fail-with-body : échoue sur un statut >= 400 en affichant
          # le corps (utile pour diagnostiquer un 403 = secret incorrect).
          url="${BASE_URL%/}/api/notifications/run"
          for attempt in 1 2 3; do
            echo "Tentative $attempt : POST $url"
            if curl -sS --fail-with-body --max-time 120 \
                 -X POST "$url" -H "x-cron-secret: $CRON_SECRET"; then
              echo ""
              echo "Détection déclenchée avec succès."
              exit 0
            fi
            echo "Échec (tentative $attempt) — nouvelle tentative dans 30 s…"
            sleep 30
          done
          echo "Déclenchement impossible après 3 tentatives."
          exit 1
